name: 💡 功能建议
description: 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！你的想法对我们很重要 ✨
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 你希望解决什么问题？
      placeholder: "例如: 每次切换模型都要手动编辑配置文件，很不方便..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 理想方案
      description: 你期望的解决方案是什么？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过其他替代方案吗？
  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      options:
        - 🔴 高 — 严重影响使用
        - 🟡 中 — 提升体验
        - 🟢 低 — 锦上添花
    validations:
      required: true
